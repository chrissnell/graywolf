[package]
name = "graywolf-demod"
version = "0.1.0"
edition = "2021"
description = "Rust port of the Dire Wolf AFSK demodulator"

[dependencies]
claxon = "0.4"
prost = "0.13"
bytes = "1"
cpal = "0.15"

[build-dependencies]
prost-build = "0.13"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.bench]
inherits = "release"

[[bench]]
name = "afsk_bench"
harness = false

[[bin]]
name = "graywolf-modem"
path = "src/bin/graywolf_modem.rs"

[[bin]]
name = "demod-bench"
path = "src/bin/demod_bench.rs"
