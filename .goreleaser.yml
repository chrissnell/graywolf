version: 2

project_name: graywolf

before:
  hooks:
    - go mod tidy

builds:
  - id: graywolf
    binary: graywolf
    main: ./cmd/graywolf/
    env:
      - CGO_ENABLED=0
    ldflags:
      - -w
      - -s
      - -X main.Version={{.Version}}
      # Prefer the fixed-length short SHA computed by the release workflow so
      # this binary and the Rust modem agree; fall back to GoReleaser's own
      # (variable-length) ShortCommit for local/snapshot builds (graywolf#310).
      - -X main.GitCommit={{ envOrDefault "GRAYWOLF_GIT_COMMIT" .ShortCommit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    # Two 32-bit ARM builds: GOARM=6 for armv6-only Pi (1/Zero), GOARM=7
    # for armv7-a boards. Their Rust modem counterparts differ too -- the
    # GOARM=7 archive/package bundle the NEON modem (see rust-bin paths
    # below). goarch=arm + goarm 6/7 both map to dpkg "armhf"; the nfpm
    # file_name_template disambiguates the .deb/.rpm names.
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm

archives:
  - id: graywolf
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if and (eq .Arch "arm") (eq .Arm "6") }}armv6l
      {{- else if and (eq .Arch "arm") (eq .Arm "7") }}armv7l
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*
      # goarch=arm covers both GOARM=6 (linux_arm) and GOARM=7
      # (linux_armv7) Rust modems; pick the matching one by GOARM so the
      # armv7 archive ships the NEON build, not the scalar armv6 one.
      - src: "rust-bin/{{ .Os }}_{{ .Arch }}{{ if and (eq .Arch \"arm\") (eq .Arm \"7\") }}v7{{ end }}/graywolf-modem{{ if eq .Os \"windows\" }}.exe{{ end }}"
        dst: .
        strip_parent: true

nfpms:
  - id: graywolf
    package_name: graywolf
    vendor: chrissnell
    homepage: https://github.com/chrissnell/graywolf
    maintainer: Chris Snell
    description: APRS radio transceiver, digipeater, and Internet gateway
    license: MIT
    formats:
      - deb
      - rpm
    # goarch=arm + GOARM 6 and 7 both map to dpkg "armhf", so the default
    # conventional name collides (two graywolf_<ver>_armhf.deb). Keep the
    # conventional name for every arch except the new armv7 build, which
    # gets a distinct armv7l name so operators can tell the NEON package
    # apart from the armv6 one.
    file_name_template: >-
      {{- if and (eq .Arch "arm") (eq .Arm "7") -}}
      {{ .PackageName }}_{{ .Version }}_armv7l{{ .ConventionalExtension }}
      {{- else -}}
      {{ .ConventionalFileName }}
      {{- end -}}
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/graywolf.service
        dst: /usr/lib/systemd/system/graywolf.service
      - src: packaging/udev/99-graywolf-cm108.rules
        dst: /etc/udev/rules.d/99-graywolf-cm108.rules
        type: config
      # armv7 (GOARM=7) ships the NEON modem from linux_armv7; every other
      # arch (including armv6) uses linux_<arch>.
      - src: "rust-bin/linux_{{ .Arch }}{{ if and (eq .Arch \"arm\") (eq .Arm \"7\") }}v7{{ end }}/graywolf-modem"
        dst: /usr/bin/graywolf-modem
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh

dockers:
  - image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: amd64
    extra_files:
      - graywolf-modem-amd64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
  - image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser.arm64
    use: buildx
    goos: linux
    goarch: arm64
    extra_files:
      - graywolf-modem-arm64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"

docker_manifests:
  - name_template: "ghcr.io/chrissnell/graywolf:{{ .Tag }}"
    image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-amd64"
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/chrissnell/graywolf:latest"
    image_templates:
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-amd64"
      - "ghcr.io/chrissnell/graywolf:{{ .Tag }}-arm64"

checksum:
  name_template: checksums.txt

release:
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
  target_commitish: '{{ .Commit }}'
  prerelease: auto
  mode: replace

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Build and dependencies"
      regexp: '^.*?build(\([[:word:]]+\))??!?:.+$'
      order: 30
    - title: Misc
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

snapshot:
  version_template: "{{ .Version }}-{{.ShortCommit}}"
